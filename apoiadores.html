<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apoiadores - Pokémon Jornada Deslumbrante</title>
  <link rel="icon" type="image/png" href="logo_jornada_deslumbrante-removebg-preview.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;  /* fundo preto sólido */
      color: #f5f5f5;
      font-family: 'Arial', 'Segoe UI', sans-serif;
      text-align: center;
      padding: 30px 20px;
      min-height: 100vh;
    }

    /* Logo */
    .logo {
      width: 180px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 6px #22c55e);
    }

    h1 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    .subtitulo {
      color: #bdbdbd;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    /* Grid de cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Card individual */
    .card {
      background: linear-gradient(145deg, #0f0f0f, #080808);
      border: 1px solid rgba(34,197,94, 0.4);
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      text-align: left;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px rgba(0,0,0,0.7);
      border-color: #22c55e;
    }

    .card-imagem {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    .card-conteudo {
      padding: 20px;
    }

    .card-nome {
      font-size: 1.5rem;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .card-descricao {
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    /* Rodapé */
    footer {
      margin-top: 60px;
      padding: 20px;
      border-top: 1px solid #22c55e30;
      color: #888;
      font-size: 0.85rem;
    }

    /* Hotdog flutuante clicável - centralizado */
    .hotdog-flutuante {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 9999;
      cursor: pointer;
      opacity: 0.35;
      transition: opacity 0.2s, transform 0.2s;
      animation: flutuarHotdog 3s ease-in-out infinite;
    }

    .hotdog-flutuante:hover {
      opacity: 0.8;
      transform: translate(-50%, -50%) scale(1.05);
    }

    .hotdog-flutuante img {
      width: 100px;
      height: auto;
      filter: drop-shadow(0 0 8px #22c55e);
      pointer-events: auto;  /* garante que o clique funcione */
    }

    @keyframes flutuarHotdog {
      0% { transform: translate(-50%, -50%) translateY(0); }
      50% { transform: translate(-50%, -50%) translateY(-12px); }
      100% { transform: translate(-50%, -50%) translateY(0); }
    }

    /* Responsivo */
    @media (max-width: 640px) {
      body {
        padding: 20px 12px;
      }
      .cards-grid {
        gap: 20px;
      }
      .card-nome {
        font-size: 1.3rem;
      }
      .hotdog-flutuante img {
        width: 70px;
      }
    }
  </style>
</head>
<body>

  <img class="logo" src="logo_jornada_deslumbrante-removebg-preview.png" alt="Logo Jornada Deslumbrante">
  <h1>✨ Apoiadores ✨</h1>
  <div class="subtitulo">Pessoas e entidades que tornam esta jornada possível</div>

  <div class="cards-grid" id="cardsContainer">
    <!-- Os cards serão inseridos aqui via JavaScript -->
  </div>

  <footer>
    Pokémon Jornada Deslumbrante © 2026 – Agradecemos a todos os apoiadores!
  </footer>

  <!-- Hotdog flutuante clicável (centralizado) -->
  <div class="hotdog-flutuante" id="hotdogBtn">
    <img src="Pasta-de-imagens/hotdog.webp" alt="Hotdog mágico">
  </div>

  <script>
    // ============================================================
    // LISTA DE APOIADORES (edite aqui para adicionar/remover/alterar)
    // Cada apoiador precisa ter:
    //   - imagem: URL ou caminho da imagem (pode ser link ou arquivo local)
    //   - nome: nome do apoiador
    //   - descricao: texto de descrição ou mensagem
    // ============================================================
    const apoiadores = [
      {
        imagem: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png",
        nome: "Ash Treinador",
        descricao: "Apoia a jornada desde o primeiro dia. Fornece Pokébolas e poções."
      },
      {
        imagem: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/6.png",
        nome: "Gary Oak",
        descricao: "Patrocinador Master. Garante transporte e equipamentos de batalha."
      },
      {
        imagem: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png",
        nome: "Mística Noite",
        descricao: "Ajuda com itens misteriosos e mapas antigos."
      },
      {
        imagem: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/1.png",
        nome: "Bulba Seed",
        descricao: "Fornece energia sustentável para os eventos."
      }
      // ========== ADICIONE MAIS APOIADORES AQUI ==========
      // Exemplo:
      // {
      //   imagem: "caminho/para/sua-imagem.jpg",
      //   nome: "Nome do Apoiador",
      //   descricao: "Descrição personalizada que aparecerá no card."
      // },
    ];

    // Função que renderiza os cards dinamicamente
    function renderizarCards() {
      const container = document.getElementById("cardsContainer");
      if (!container) return;

      container.innerHTML = ""; // limpa o conteúdo existente

      apoiadores.forEach(apoiador => {
        const card = document.createElement("div");
        card.className = "card";

        // Imagem
        const img = document.createElement("img");
        img.src = apoiador.imagem;
        img.alt = `Apoiador ${apoiador.nome}`;
        img.className = "card-imagem";
        img.onerror = () => {
          img.src = "https://placehold.co/400x200?text=Imagem+Indisponível";
        };

        // Conteúdo do card
        const conteudoDiv = document.createElement("div");
        conteudoDiv.className = "card-conteudo";

        const nomeEl = document.createElement("div");
        nomeEl.className = "card-nome";
        nomeEl.textContent = apoiador.nome;

        const descEl = document.createElement("div");
        descEl.className = "card-descricao";
        descEl.textContent = apoiador.descricao;

        conteudoDiv.appendChild(nomeEl);
        conteudoDiv.appendChild(descEl);
        card.appendChild(img);
        card.appendChild(conteudoDiv);

        container.appendChild(card);
      });
    }

    // Redirecionar para o vídeo ao clicar no hotdog
    function setupHotdog() {
      const hotdog = document.getElementById("hotdogBtn");
      if (hotdog) {
        hotdog.addEventListener("click", () => {
          // Abre o vídeo na mesma aba (ou pode usar window.open para nova aba)
          window.location.href = "Pasta-de-imagens/papyrus.mp4";
        });
      }
    }

    // Inicializa tudo quando a página carregar
    renderizarCards();
    setupHotdog();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apoiadores - Pokémon Jornada Deslumbrante</title>
  <link rel="icon" type="image/png" href="logo_jornada_deslumbrante-removebg-preview.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000000;
      color: #f5f5f5;
      font-family: 'Arial', 'Segoe UI', sans-serif;
      text-align: center;
      padding: 0 20px 30px; /* ajuste para não quebrar com o menu fixo */
      min-height: 100vh;
    }

    /* ========== MENU PRINCIPAL (scroll horizontal + ocultação) ========== */
    .menu-principal {
      background: #111111;
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 12px;
      padding: 15px 20px;
      border-bottom: 1px solid #22c55e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: transform 0.3s ease;
      overflow-x: auto;
      flex-wrap: nowrap;
      white-space: nowrap;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 30px; /* espaçamento após o menu */
    }

    .menu-principal::-webkit-scrollbar {
      height: 4px;
    }
    .menu-principal::-webkit-scrollbar-track {
      background: #222;
      border-radius: 4px;
    }
    .menu-principal::-webkit-scrollbar-thumb {
      background: #22c55e;
      border-radius: 4px;
    }

    .menu-principal a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.2s;
      background: #1a1a1a;
      border: 1px solid #22c55e;
      flex-shrink: 0;
    }

    .menu-principal a:hover {
      background: #22c55e;
      color: black;
      transform: translateY(-1px);
    }

    .menu-principal.escondido {
      transform: translateY(-100%);
    }

    /* Logo */
    .logo {
      width: 180px;
      margin-bottom: 20px;
    }

    h1 {
      color: #22c55e;
      margin-bottom: 10px;
      font-size: 2.2rem;
      letter-spacing: 1px;
    }

    .subtitulo {
      color: #bdbdbd;
      margin-bottom: 40px;
      font-size: 1rem;
    }

    /* Grid de cards */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 30px;
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Card individual */
    .card {
      background: linear-gradient(145deg, #0f0f0f, #080808);
      border: 1px solid rgba(34,197,94, 0.4);
      border-radius: 24px;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      text-align: left;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 30px rgba(0,0,0,0.7);
      border-color: #22c55e;
    }

    .card-imagem {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
    }

    .card-conteudo {
      padding: 20px;
    }

    .card-nome {
      font-size: 1.5rem;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .card-descricao {
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    /* Rodapé */
    footer {
      margin-top: 60px;
      padding: 20px;
      border-top: 1px solid #22c55e30;
      color: #888;
      font-size: 0.85rem;
    }

    /* Hotdog flutuante */
    .hotdog-flutuante {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
      cursor: pointer;
      transition: transform 0.2s ease, filter 0.2s ease;
      animation: flutuarHotdog 2.2s ease-in-out infinite;
    }

    .hotdog-flutuante img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.35));
    }

    .hotdog-flutuante:hover {
      transform: scale(1.06);
      filter: brightness(1.08);
    }

    @keyframes flutuarHotdog {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    /* Responsivo */
    @media (max-width: 640px) {
      body {
        padding: 0 12px 20px;
      }
      .cards-grid {
        gap: 20px;
      }
      .card-nome {
        font-size: 1.3rem;
      }
      .hotdog-flutuante {
        right: 14px;
        bottom: 14px;
      }
      .hotdog-flutuante img {
        width: 60px;
        height: 60px;
      }
      .menu-principal {
        padding: 12px 16px;
        gap: 10px;
        margin-bottom: 20px;
      }
      .menu-principal a {
        padding: 8px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <!-- MENU COM SCROLL E OCULTAÇÃO -->
  <nav class="menu-principal">
    <a href="apoiadores.html">Apoiadores</a>
    <a href="jornada.html">Jornada</a>
    <a href="ferramentas.html">Ferramentas</a>
    <a href="Ferramentas-do-mestre.html">Mestre</a>
    <a href="Pokedex/">Pokédex</a>
  </nav>

  <img class="logo" src="logo_jornada_deslumbrante-removebg-preview.png" alt="Logo Jornada Deslumbrante">
  <h1>Apoiadores</h1>
  <div class="subtitulo">Amigos que tornam esta jornada possível</div>

  <div class="cards-grid" id="cardsContainer">
    <!-- Os cards serão inseridos via JavaScript -->
  </div>

  <footer>
    Pokémon Jornada Deslumbrante © 2026 – Agradecemos a todos os apoiadores!
  </footer>

  <!-- Hotdog flutuante -->
  <div class="hotdog-flutuante" id="hotdogBtn">
    <img src="Pasta-de-imagens/hotdog.webp" alt="Hotdog mágico">
  </div>

  <script>
    // ========== MENU: OCULTAR AO ROLAR PARA BAIXO ==========
    (function() {
      const menu = document.querySelector('.menu-principal');
      if (!menu) return;
      let ultimoScroll = window.scrollY;
      window.addEventListener('scroll', function() {
        const atualScroll = window.scrollY;
        if (atualScroll > ultimoScroll && atualScroll > 80) {
          menu.classList.add('escondido');
        } else {
          menu.classList.remove('escondido');
        }
        ultimoScroll = atualScroll;
      });
    })();

    // ========== LISTA DE APOIADORES ==========
    const apoiadores = [
      {
        imagem: "Pasta-de-imagens/masterball.png",
        nome: "Erick Brito",
        descricao: "Enfrentou Kyogre no mar sem saber nadar. Jogador da mesa oficial"
      },
      {
        imagem: "Pasta-de-imagens/masterball.png",
        nome: "Arthur Aragão",
        descricao: "Venceu Arceus no Pedra, Papel ou Tesoura. Jogador da mesa oficial"
      },
      {
        imagem: "Pasta-de-imagens/masterball.png",
        nome: "Marllon Silva",
        descricao: "Capturou um Zubat com uma Masterball. Jogador da mesa oficial"
      },
      {
        imagem: "Pasta-de-imagens/masterball.png",
        nome: "Yan Luka",
        descricao: "Teve sua perna puxada por todos os tipos de pokémons. Jogador da mesa oficial"
      },
      {
        imagem: "Pasta-de-imagens/ultraball.png",
        nome: "Mateus Rosa",
        descricao: "Ajudou na confecção das páginas na mídia física do sistema."
      },      
      {
        imagem: "Pasta-de-imagens/ultraball.png",
        nome: "Lívia Rose",
        descricao: "Ajudou na impressão das páginas na mídia física do sistema."
      },      
      {
        imagem: "Pasta-de-imagens/ultraball.png",
        nome: "Lincoln Aguiar",
        descricao: "Meu primeiro mestre. Me mostrou o incrível mundo de encenação e plantou a semente que fez florecer essa ideia."
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Estourado69",
        descricao: "Forneceu a ideia de hospedagem do site. Dando apoio ao projeto."
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Rewdheng",
        descricao: "Forneceu feedbacks que foram importantes para a formatação visual e escrita das páginas"
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Snowy_aprofetisa",
        descricao: "Forneceu apoio, não só ao projeto como a mim."
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Jpedro_12we",
        descricao: "Forneceu feedbacks que foram importantes para a formatação visual das páginas"
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Vaziuz",
        descricao: "Forneceu feedbacks que foram importantes para a formatação visual e escrita das páginas"
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Serenity_zyx",
        descricao: "Forneceu feedbacks que foram importantes para a formatação visual e escrita das páginas"
      },      
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Arina_tempest",
        descricao: "Forneceu feedbacks que foram importantes para a escrita das páginas"
      },
      {
        imagem: "Pasta-de-imagens/greatball.png",
        nome: "Guzta3636",
        descricao: "Deu apoio artístico que foi importante para o capítulo de Condições Especiais."
      }
    ];

    function renderizarCards() {
      const container = document.getElementById("cardsContainer");
      if (!container) return;
      container.innerHTML = "";

      apoiadores.forEach(apoiador => {
        const card = document.createElement("div");
        card.className = "card";

        const img = document.createElement("img");
        img.src = apoiador.imagem;
        img.alt = `Apoiador ${apoiador.nome}`;
        img.className = "card-imagem";
        img.onerror = () => {
          img.src = "https://placehold.co/400x200?text=Imagem+Indisponível";
        };

        const conteudoDiv = document.createElement("div");
        conteudoDiv.className = "card-conteudo";

        const nomeEl = document.createElement("div");
        nomeEl.className = "card-nome";
        nomeEl.textContent = apoiador.nome;

        const descEl = document.createElement("div");
        descEl.className = "card-descricao";
        descEl.textContent = apoiador.descricao;

        conteudoDiv.appendChild(nomeEl);
        conteudoDiv.appendChild(descEl);
        card.appendChild(img);
        card.appendChild(conteudoDiv);
        container.appendChild(card);
      });
    }

    function setupHotdog() {
      const hotdog = document.getElementById("hotdogBtn");
      if (hotdog) {
        hotdog.addEventListener("click", () => {
          window.location.href = "Pasta-de-imagens/papyrus.mp4";
        });
      }
    }

    renderizarCards();
    setupHotdog();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon Jornada Deslumbrante</title>
  <link rel="icon" href="logo_jornada_deslumbrante-removebg-preview.png" />
  <style>
    :root {
      --bg: #050505;
      --panel: #101010;
      --panel-2: #171717;
      --text: #f5f5f5;
      --muted: #bdbdbd;
      --green: #22c55e;
      --yellow: #facc15;
      --border: rgba(255,255,255,0.12);
      --shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 18px 40px rgba(0,0,0,0.38);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(34,197,94,0.10), transparent 28%),
        linear-gradient(180deg, #000000, #0a0a0a 30%, #050505 100%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, #0f0f0f, #1a1a1a);
      color: white;
      padding: 24px 20px;
      text-align: center;
      border-bottom: 2px solid var(--green);
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: var(--green);
    }

    header p {
      font-size: 1rem;
      color: white;
      opacity: 0.9;
    }

    /* ===== NAVEGAÇÃO COM SCROLL HORIZONTAL ===== */
    nav {
      background: #111111;
      display: flex;
      justify-content: flex-start;   /* alinha à esquerda */
      align-items: center;
      gap: 12px;
      padding: 15px 20px;
      border-bottom: 1px solid var(--green);
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      position: sticky;
      top: 0;
      z-index: 1000;
      transition: transform 0.3s ease;

      /* Scroll horizontal */
      overflow-x: auto;
      flex-wrap: nowrap;
      white-space: nowrap;
      scrollbar-width: thin;        /* Firefox */
      -webkit-overflow-scrolling: touch;  /* suavidade no iOS */
    }

    /* Esconde a barra de rolagem (mas mantém a função) – opcional, tira os comentários se quiser */
    /*
    nav::-webkit-scrollbar {
      display: none;
    }
    nav {
      scrollbar-width: none;
    }
    */

    /* Estilização leve da barra (aparece só quando arrasta) */
    nav::-webkit-scrollbar {
      height: 4px;
    }
    nav::-webkit-scrollbar-track {
      background: #222;
      border-radius: 4px;
    }
    nav::-webkit-scrollbar-thumb {
      background: var(--green);
      border-radius: 4px;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.2s;
      background: #1a1a1a;
      border: 1px solid var(--green);
      flex-shrink: 0;       /* impede que os links encolham */
    }

    nav a:hover {
      background: var(--green);
      color: black;
      transform: translateY(-1px);
    }

    .container {
      width: min(1220px, calc(100% - 24px));
      margin: 24px auto 40px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(34,197,94,0.18), rgba(250,204,21,0.12));
      border: 1px solid rgba(34,197,94,0.28);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h2 {
      margin-bottom: 8px;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      color: white;
    }

    .hero p {
      color: var(--muted);
      line-height: 1.5;
    }

    .ficha-box {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .ficha-topo {
      padding: 18px 20px;
      border-bottom: 1px solid rgba(34,197,94,0.28);
      background: #0d0d0d;
    }

    .ficha-topo h3 {
      color: var(--green);
      margin-bottom: 8px;
      font-size: 1.2rem;
    }

    .ficha-topo p {
      color: #e5e7eb;
      line-height: 1.5;
    }

    .ficha-frame {
      width: 100%;
      height: 1600px;
      border: none;
      background: #000;
      display: block;
    }

    footer {
      background: #0a0a0a;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      border-top: 1px solid var(--green);
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 1.6rem;
      }

      .ficha-frame {
        height: 1200px;
      }
    }

    @media (max-width: 640px) {
      .container {
        width: min(100%, calc(100% - 16px));
      }

      .hero {
        padding: 16px;
      }

      nav {
        padding: 12px 16px;
        gap: 10px;
      }

      nav a {
        padding: 8px 14px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Pokémon Jornada Deslumbrante</h1>
    <p>Pokémon Jornada Deslumbrante © 2026</p>
  </header>

  <!-- Nav com scroll horizontal no celular -->
<nav class="menu-principal">
  <a href="index.html">Início</a>
  <a href="apoiadores.html">Apoiadores</a>
  <a href="jornada.html">Jornada</a>
  <a href="ferramentas.html">Ferramentas</a>
  <a href="Ferramentas-do-mestre.html">Mestre</a>
  <a href="Pokedex/">Pokédex</a>
</nav>
  <iframe
    class="ficha-frame"
    src="jornada_ficha_treinador.html"
    title="Ficha do Treinador - Jornada Deslumbrante">
  </iframe>

  <footer>
    <p>Pokémon Jornada Deslumbrante © 2026</p>
  </footer>

  <script>
    let ultimoScroll = window.scrollY;
    const menu = document.querySelector("nav");

    window.addEventListener("scroll", () => {
      const atualScroll = window.scrollY;

      if (atualScroll > ultimoScroll && atualScroll > 80) {
        menu.classList.add("escondido");
      } else {
        menu.classList.remove("escondido");
      }

      ultimoScroll = atualScroll;
    });
  </script>

  <a href="Teste rápido JD.html" class="dado-flutuante" title="Ir para rolagem de dados">
    <img src="dado.webp" alt="Rolagem de dados" />
  </a>

  <style>
    .dado-flutuante {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 9999;
      animation: flutuar 2.2s ease-in-out infinite;
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .dado-flutuante img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.35));
    }

    .dado-flutuante:hover {
      transform: scale(1.06);
      filter: brightness(1.08);
    }

    @keyframes flutuar {
      0% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .dado-flutuante {
        right: 14px;
        bottom: 14px;
      }

      .dado-flutuante img {
        width: 60px;
        height: 60px;
      }
    }
  </style>

</body>
</html>

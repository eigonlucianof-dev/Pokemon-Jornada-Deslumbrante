<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokémon Jornada Deslumbrante</title>
  <link rel="icon" href="logo_jornada_deslumbrante-removebg-preview.png">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #000000, #0a0a0a);
      color: white;
    }

    header {
      background: linear-gradient(90deg, #0f0f0f, #1a1a1a);
      color: white;
      padding: 24px 20px;
      text-align: center;
      border-bottom: 2px solid #22c55e;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #22c55e;
    }

    header p {
      font-size: 1rem;
      color: white;
      opacity: 0.9;
    }

    nav {
      background: #111111;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 15px;
      border-bottom: 1px solid #22c55e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.35);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 10px 18px;
      border-radius: 999px;
      transition: 0.2s;
      background: #1a1a1a;
      border: 1px solid #22c55e;
    }

    nav a:hover {
      background: #22c55e;
      color: black;
      transform: translateY(-1px);
    }

    .hero {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      text-align: center;
    }

    .hero h2 {
      font-size: 2rem;
      margin-bottom: 12px;
      color: #22c55e;
    }

    .hero p {
      font-size: 1.05rem;
      margin-bottom: 24px;
      color: #e5e7eb;
    }

    .botoes {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
    }

    .botao {
      text-decoration: none;
      background: #22c55e;
      color: black;
      padding: 14px 20px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 4px 10px rgba(34, 197, 94, 0.25);
    }

    .botao:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .secoes {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111111;
      border: 1px solid #22c55e;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #22c55e;
    }

    .card p {
      margin-bottom: 14px;
      color: #e5e7eb;
      line-height: 1.5;
    }

    .card a {
      text-decoration: none;
      color: black;
      background: #22c55e;
      padding: 10px 14px;
      display: inline-block;
      border-radius: 10px;
      font-weight: bold;
    }

    .card a:hover {
      background: #16a34a;
    }

    .ficha-section {
      max-width: 1200px;
      margin: 20px auto 50px;
      padding: 20px;
    }

    .ficha-box {
      background: #111111;
      border: 1px solid #22c55e;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    .ficha-topo {
      padding: 18px 20px;
      border-bottom: 1px solid #22c55e;
      background: #0d0d0d;
    }

    .ficha-topo h2 {
      color: #22c55e;
      margin-bottom: 8px;
    }

    .ficha-topo p {
      color: #e5e7eb;
      line-height: 1.5;
    }

    .ficha-frame {
      width: 100%;
      height: 1200px;
      border: none;
      background: #000;
      display: block;
    }

    footer {
      background: #0a0a0a;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 30px;
      border-top: 1px solid #22c55e;
    }

    @media (max-width: 700px) {
      header h1 {
        font-size: 1.6rem;
      }

      .hero h2 {
        font-size: 1.5rem;
      }

      .ficha-frame {
        height: 900px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>Pokémon Jornada Deslumbrante</h1>
    <p>Pokémon Jornada Deslumbrante © 2026</p>
  </header>

  <nav>
    <a href="apoiadores.html">Apoiadores</a>
    <a href="jornada.html">Jornada</a>
    <a href="ferramentas.html">Ferramentas</a>
  </nav>
  <section class="ficha-section">
    <div class="ficha-box">
      <div class="ficha-topo">
        <h2>Ficha de Treinador</h2>
        <p>A ficha fica visível diretamente na página inicial, e o menu continua disponível para as outras seções.</p>
      </div>

      <iframe
        class="ficha-frame"
        src="jornada_ficha_treinador.html"
        title="Ficha de Treinador - Jornada Deslumbrante">
      </iframe>
    </div>
  </section>

  <footer>
    <p>Pokémon Jornada Deslumbrante © 2026</p>
  </footer>

</body>
</html>
